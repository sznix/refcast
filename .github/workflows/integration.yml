name: integration
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-extras --dev
      - run: uv run pytest -m integration -q
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
