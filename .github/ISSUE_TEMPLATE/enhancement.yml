name: Feature request
description: Suggest something new
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that refcast doesn't support yet?
      placeholder: "I want to query Perplexity as a backend, but there's no adapter for it."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would the solution look like?
      description: How do you imagine this working? Code examples welcome.

  - type: textarea
    id: alternatives
    attributes:
      label: What are you doing today instead?
      description: Any workarounds you're using right now?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New backend
        - New MCP tool
        - CLI
        - Error handling
        - Performance
        - Documentation
        - Other
